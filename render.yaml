services:
  - type: web
    name: hr-recruitment-senior
    env: python
    plan: free
    buildCommand: |
      HIMALAYA_VERSION=1.2.0
      curl -L -o /tmp/himalaya.tgz https://github.com/pimalaya/himalaya/releases/download/v${HIMALAYA_VERSION}/himalaya.x86_64-linux.tgz
      tar -xzf /tmp/himalaya.tgz -C /usr/local/bin himalaya
      chmod +x /usr/local/bin/himalaya
      pip install -r requirements.txt
    startCommand: bash start.sh
